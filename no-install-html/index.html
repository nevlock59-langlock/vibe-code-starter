<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No-install HTML MVP</title>
</head>
<body>
  <h1>No-install HTML MVP</h1>
  <p>npm install 없이 브라우저에서 바로 실행되는 단일 HTML MVP 템플릿입니다.</p>

  <label for="userInput">Input</label>
  <textarea id="userInput" rows="5" placeholder="내용을 입력하세요"></textarea>

  <button id="runButton">Run</button>
  <button id="resetButton">Reset</button>

  <pre id="output">Result will appear here.</pre>

  <script>
    const userInput = document.getElementById("userInput");
    const output = document.getElementById("output");

    document.getElementById("runButton").addEventListener("click", () => {
      const value = userInput.value.trim();
      output.textContent = value
        ? `Input received:\n\n${value}`
        : "Please enter something first.";
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      userInput.value = "";
      output.textContent = "Result will appear here.";
    });
  </script>
</body>
</html>
